<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocLib v1.18</title>      

    <!-- ✅ KRITISK -->
    <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>

    <!-- ✅ DIN ORIGINAL CSS (URØRT) -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');  
        :root {  
            --bg:#f3f4f6;        
            --surface:#ffffff;        
            --border:#d1d5db;        
            --ink:#111827;        
            --muted:#6b7280;        
            --blue:#1d4ed8;        
            --ok:#22a06b;  
            --warn:#f79009;  
            --bad:#d92d20;  
            --sans:'Syne', sans-serif;  
        }  
        body {font-family:var(--sans);margin:0;background:var(--bg);display:flex;flex-direction:column;height:100vh;}
        .topbar {height:92px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:18px;padding:10px 18px;}
        .logo-card {width:145px;height:68px;border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;}
        .app-title b {font-size:18px;color:#0050b5;}
        .main-content {padding:20px;flex:1;overflow-y:auto;}
        table {width:100%;border-collapse:collapse;background:#fff;}
        th,td {padding:12px;border-bottom:1px solid #dee2e6;}
    </style>
</head>

<body>

<header class="topbar">
    <div class="logo-card">
        <img src="norconsult-logo-black.png">
    </div>
    <div class="app-title">
        <b>DocLib v1.18</b>
        <span>Norconsult Norge</span>
    </div>
    <div style="margin-left:auto">
        <span id="statusText">Starter...</span>
    </div>
</header>

<div class="main-content">

<table>
<thead>
<tr>
<th>Filnavn</th>
<th>Mappe</th>
<th>Fag</th>
<th>MMI</th>
<th>Revisjon</th>
<th>Revisjonsdato</th>
<th>Gjelder</th>
</tr>
</thead>

<tbody id="tableBody">
<tr><td colspan="7">Laster...</td></tr>
</tbody>
</table>

</div>

<script>

// ✅ GLOBAL FAILSAFE
window.onerror = function(msg, url, line, col, error) {
    console.error("GLOBAL ERROR:", msg, error);
};

let API = null;
let currentProject = null;
let accessToken = null;
let allFilesData = [];

const setStatus = (m) => {
    document.getElementById('statusText').innerText = m;
};

// ✅ INIT (URØRT + STABIL)
async function initExtension() {
    try {
        setStatus("Kobler...");

        API = await window.TrimbleConnectWorkspace.connect(window.parent);

        // ✅ KRITISK FOR SIDEPANEL
        if (API.ui && API.ui.setMenu) {
            await API.ui.setMenu({
                title: "DocLib",
                command: "open_explorer"
            }).catch(()=>{});
        }

        if (API.ui && API.ui.onCommand) {
            API.ui.onCommand((cmd) => {
                if (cmd === "open_explorer") {
                    API.ui.setActiveMenuItem("open_explorer").catch(()=>{});
                }
            });
        }

        currentProject = await API.project.getProject();

        try {
            const tokenData = await API.extension.getPermission("accesstoken");
            accessToken = typeof tokenData === 'string'
                ? tokenData
                : (tokenData?.accessToken || "");
        } catch {}

        if (!accessToken) throw new Error("Token mangler");

        fetchProjectFiles(currentProject.id);

    } catch (e) {
        console.error(e);
        setStatus("Init-feil");
    }
}

window.onload = initExtension;


// ✅ HENT FILER (URØRT)
async function hentAlleIfc(folderId, folderName, baseUrl) {

    let funnet = [];

    try {
        const res = await fetch(`${baseUrl}/tc/api/2.0/folders/${folderId}/items`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        const data = await res.json();
        const items = data.items || data;

        for (const item of items) {

            if (item.type === 'FILE' && item.name.toLowerCase().endsWith('.ifc')) {
                item.folderName = folderName;
                funnet.push(item);
            }

            if (item.type === 'FOLDER') {
                const sub = await hentAlleIfc(item.id, item.name, baseUrl);
                funnet = funnet.concat(sub);
            }
        }

    } catch {}

    return funnet;
}


// ✅ HOVED
async function fetchProjectFiles(projectId) {

    const baseUrl = "https://app21.connect.trimble.com";

    const proj = await fetch(`${baseUrl}/tc/api/2.0/projects/${projectId}`, {
        headers:{ Authorization:`Bearer ${accessToken}` }
    });

    const projData = await proj.json();
    const rootId = projData.rootId;

    const modelFiles = await hentAlleIfc(rootId, "Rotmappe", baseUrl);

    allFilesData = await Promise.all(modelFiles.map(async file => {
        const meta = await fetchFileMetadata(file.id, file.name, baseUrl);
        return { name:file.name, folderName:file.folderName, ...meta };
    }));

    renderTable(allFilesData);
    setStatus("Ferdig");
}


// ✅ DEN ENESTE DELEN SOM ER ENDRET (FAILSAFE)
async function fetchFileMetadata(fileId, fileName, baseUrl) {

    const defaultMeta = {
        fag:"-", mmi:"-", revisjon:"-", revisjonsdato:"-", gjelder:"-"
    };

    try {

        const fileRes = await fetch(`${baseUrl}/tc/api/2.0/files/${fileId}`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        if (!fileRes.ok) return defaultMeta;

        const fileData = await fileRes.json();
        const modelId = fileData?.modelId;

        if (!modelId) return defaultMeta;

        const propRes = await fetch(`${baseUrl}/tc/api/2.0/models/${modelId}/properties`, {
            headers:{ Authorization:`Bearer ${accessToken}` }
        });

        if (!propRes.ok) return defaultMeta;

        const propData = await propRes.json();

        console.log("IFC:", fileName, propData);

        return {
            fag: safeExtract(propData, ["Fag"]),
            mmi: safeExtract(propData, ["MMI"]),
            revisjon: safeExtract(propData, ["Revisjon"]),
            revisjonsdato: safeExtract(propData, ["Revisjonsdato"]),
            gjelder: safeExtract(propData, ["Gjelder","Beskrivelse"])
        };

    } catch {
        return defaultMeta;
    }
}


// ✅ SAFE PARSER
function safeExtract(data, keys) {

    try {
        if (!data) return "-";

        for (const k of keys) {
            if (data[k]) return data[k];
        }

        if (Array.isArray(data)) {
            for (const set of data) {
                if (!set || !set.properties) continue;

                for (const k of keys) {
                    if (set.properties[k]) return set.properties[k];
                }
            }
        }

        return "-";
    } catch {
        return "-";
    }
}


// ✅ RENDER (URØRT)
function renderTable(data) {

    const tbody = document.getElementById('tableBody');

    tbody.innerHTML = data.map(f => `
        <tr>
            <td>${f.name}</td>
            <td>${f.folderName}</td>
            <td>${f.fag}</td>
            <td>${f.mmi}</td>
            <td>${f.revisjon}</td>
            <td>${f.revisjonsdato}</td>
            <td>${f.gjelder}</td>
        </tr>
    `).join('');
}

</script>

</body>
</html>
